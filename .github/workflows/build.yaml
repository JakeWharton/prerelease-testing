  final-status:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - workflow-up-to-date
      - cashapp-burst
      - cashapp-licensee
      - cashapp-molecule
      - cashapp-paraphrase
      - cashapp-turbine
      - JakeWharton-cite
      - JakeWharton-diffuse
      - JakeWharton-finalization-hook
      - JakeWharton-kmp-missing-targets
      - JakeWharton-SaveArchived4Pocket
      - square-okio
      - square-okhttp
      - square-retrofit
