name: build

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - 'trunk'
  schedule:
    # 9:23 AM EST
    - cron: "23 13 * * *"

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dkotlin.incremental=false -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dorg.gradle.logging.stacktrace=full"

jobs:
  workflow-up-to-date:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: brew update && brew install d2
      - run: pip install -r .github/requirements.txt
      - run: python3 .github/generate.py
      - run: git diff --exit-code

  cashapp-burst:
    runs-on: macos-latest
    if: ${{ !cancelled() }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    needs:
      - workflow-up-to-date
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: this
      - name: "Checkout cashapp/burst repository"
        uses: actions/checkout@v4
        with:
          repository: cashapp/burst
          path: cashapp-burst
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: gradle/actions/setup-gradle@v4
      - name: Patch external dependencies
        run: |
          pip install -q toml-cli
          toml set --toml-path cashapp-burst/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
      - name: "Build cashapp/burst"
        run: |
          cd cashapp-burst
          git grep -l mavenCentral | xargs sed -i "" "s/mavenCentral()/mavenLocal(); mavenCentral()/g"
          git diff --patch
          ../this/gradlew kotlinUpgradeYarnLock build publishToMavenLocal
      - uses: actions/upload-artifact@v4
        with:
          name: cashapp-burst-snapshot
          path: ~/.m2/repository
          if-no-files-found: error
      - id: version
        run: perl -ne '/VERSION_NAME=(.*)/ and print "version=$1",$/' cashapp-burst/gradle.properties >> "$GITHUB_OUTPUT"

