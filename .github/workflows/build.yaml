          toml set --toml-path JakeWharton-diffuse/gradle/libs.versions.toml libraries.kotlinPlugin.version $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          toml set --toml-path JakeWharton-diffuse/gradle/libs.versions.toml libraries.okio.version "${{ needs.square-okio.outputs.version }}"
          cd JakeWharton-diffuse
          git grep -l mavenCentral | xargs sed -i "" "s/mavenCentral()/mavenLocal(); mavenCentral()/g"
