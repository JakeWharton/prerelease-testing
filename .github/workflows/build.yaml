name: build

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - 'trunk'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dkotlin.incremental=false -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dorg.gradle.logging.stacktrace=full"

jobs:
  burst:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: cashapp/burst
          path: burst
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path burst/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          cd burst
          git diff --patch
      - run: ./gradlew check publishToMavenLocal
        working-directory: burst
      - uses: actions/upload-artifact@v4
        with:
          name: burst-maven-local
          path: ~/.m2/repository
          if-no-files-found: error
      - id: version
        run: grep VERSION_NAME burst/gradle.properties >> "$GITHUB_OUTPUT"

  okio:
    runs-on: macos-latest
    needs:
      - burst
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: burst-maven-local
          path: ~/.m2/repository
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: square/okio
          path: okio
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path okio/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          toml set --toml-path okio/gradle/libs.versions.toml libraries.burst-gradle-plugin.version "${{ needs.burst.outputs.version }}"
          cd okio
          git apply ../this/patches/okio.patch
          git diff --patch
      - run: ./gradlew check publishToMavenLocal
        working-directory: okio

  final-status:
    if: always()
    runs-on: ubuntu-latest
    needs:
      # TODO Eliminate the need to maintain leafs, and just check ALL other jobs.
      - okio
    steps:
      - name: Check
        run: |
          results=$(tr -d '\n' <<< '${{ toJSON(needs.*.result) }}')
          if ! grep -q -v -E '(failure|cancelled)' <<< "$results"; then
            echo "One or more required jobs failed"
            exit 1
          fi
