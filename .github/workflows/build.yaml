        run: perl -ne '/VERSION_NAME=(.*)/ and print "version=$1",$/' JakeWharton-finalization-hook/gradle.properties >> "$GITHUB_OUTPUT"

  JakeWharton-SaveArchived4Pocket:
    runs-on: macos-latest
    needs:
      - workflow-up-to-date
      - square-retrofit
      - square-okhttp
    steps:
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: JakeWharton/SaveArchived4Pocket
          path: JakeWharton-SaveArchived4Pocket
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path JakeWharton-SaveArchived4Pocket/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          toml set --toml-path JakeWharton-SaveArchived4Pocket/gradle/libs.versions.toml versions.retrofit "${{ needs.square-retrofit.outputs.version }}"
          toml set --toml-path JakeWharton-SaveArchived4Pocket/gradle/libs.versions.toml versions.okhttp "${{ needs.square-okhttp.outputs.version }}"
