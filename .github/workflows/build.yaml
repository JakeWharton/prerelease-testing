name: build

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - 'trunk'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dkotlin.incremental=false -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dorg.gradle.logging.stacktrace=full"

jobs:
  burst:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: cashapp/burst
          path: burst
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path burst/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          cd burst
          git diff --patch
      - run: ./gradlew check publishToMavenLocal
        working-directory: burst

  okio:
    runs-on: macos-latest
    needs:
      # TODO Inject Burst version below.
      - burst
    steps:
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: square/okio
          path: okio
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path okio/gradle/libs.versions.toml versions.kotlin $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          cd okio
          git diff --patch
      - run: ./gradlew check publishToMavenLocal
        working-directory: okio

  turbine:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: this
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: this/.github/workflows/.java-version
      - uses: actions/checkout@v4
        with:
          repository: cashapp/turbine
          path: turbine
      - name: Patch versions
        run: |
          pip install -q toml-cli
          toml set --toml-path turbine/gradle/libs.versions.toml plugins.kotlin.version $(toml get --toml-path this/libs.versions.toml versions.kotlin)
          cd turbine
          git diff --patch
      - run: ./gradlew check publishToMavenLocal
        working-directory: turbine

  final-status:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - burst
      - okio
      - turbine
    steps:
      - name: Check
        run: |
          results=$(tr -d '\n' <<< '${{ toJSON(needs.*.result) }}')
          if ! grep -q -v -E '(failure|cancelled)' <<< "$results"; then
            echo "One or more required jobs failed"
            exit 1
          fi
