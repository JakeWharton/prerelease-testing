  final-status:
    runs-on: ubuntu-latest
    needs:
      - workflow-up-to-date
      - cashapp-burst
      - cashapp-molecule
      - cashapp-turbine
      - JakeWharton-cite
      - JakeWharton-diffuse
      - JakeWharton-finalization-hook
      - JakeWharton-SaveArchived4Pocket
      - square-okio
      - square-okhttp
      - square-retrofit
    steps:
      - name: Check
        run: |
          results=$(tr -d '\n' <<< '${{ toJSON(needs.*.result) }}')
          if ! grep -q -v -E '(failure|cancelled)' <<< "$results"; then
            echo "One or more required jobs failed"
            exit 1
          fi
