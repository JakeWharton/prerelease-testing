[versions]
agp = "8.12.0-rc01"
atomicfu = "0.28.0"
jbCompose = "1.9.0-alpha03"
kotlin = "2.2.0"
ksp = "2.2.0-2.0.2"

# These coordinates are othewise unused, but allow Renovate to understand the associated versions.
[libraries]
agp = { module = "com.android.tools.build:gradle", version.ref = "agp" }
atomicfu = { module = "org.jetbrains.kotlinx:atomicfu", version.ref = "atomicfu" }
jetbrains-compose = { module = "org.jetbrains.compose.runtime:runtime", version.ref = "jbCompose" }
kotlin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
ksp = { module = "com.google.devtools.ksp:symbol-processing-gradle-plugin", version.ref = "ksp" }
