"cashapp/burst":
  pre_build: kotlinUpgradeYarnLock
  external_dependencies:
    agp: libraries.android-gradlePlugin
    kotlin: versions.kotlin
    ksp: libraries.google-ksp
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"cashapp/licensee":
  compile_only: true # Test golden files hard code versions.
  external_dependencies:
    agp: versions.agp
    kotlin: versions.kotlin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

