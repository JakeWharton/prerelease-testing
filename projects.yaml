"cashapp/burst":
  external_dependencies:
    kotlin: versions.kotlin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"cashapp/molecule":
  external_dependencies:
    kotlin: versions.kotlin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"cashapp/turbine":
  external_dependencies:
    kotlin: plugins.kotlin.version
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"JakeWharton/cite":
  external_dependencies:
    kotlin: versions.kotlin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"JakeWharton/diffuse":
  external_dependencies:
    kotlin: libraries.kotlinPlugin.version
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"JakeWharton/finalization-hook":
  external_dependencies:
    kotlin: versions.kotlin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"JakeWharton/SaveArchived4Pocket":
  external_dependencies:
    kotlin: versions.kotlin
  internal_dependencies:
    "square/retrofit": versions.retrofit
    "square/okhttp": versions.okhttp

"square/okio":
  external_dependencies:
    kotlin: versions.kotlin
  internal_dependencies:
    "cashapp/burst": libraries.burst-gradle-plugin.version
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"square/okhttp":
  compile_only: true # Build is all kinds of messed up.
  external_dependencies:
    kotlin: versions.org-jetbrains-kotlin
  internal_dependencies:
    "square/okio": versions.com-squareup-okio
  version:
    file: build.gradle.kts
    regex: "version = (.*)"

"square/retrofit":
  external_dependencies:
    kotlin: versions.kotlin
  internal_dependencies:
    "square/okhttp": versions.okhttp
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"
