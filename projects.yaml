"square/okio":
  pre_build: kotlinUpgradeYarnLock
  external_dependencies:
    kotlin: versions.kotlin
    agp: libraries.android-gradle-plugin
  internal_dependencies:
    "cashapp/burst": libraries.burst-gradle-plugin
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

"square/okhttp":
  compile_only: true # Build is all kinds of messed up.
  external_dependencies:
    kotlin: versions.org-jetbrains-kotlin
    ksp: versions.ksp
  internal_dependencies:
    "square/okio": versions.com-squareup-okio
  version:
    file: build.gradle.kts
    regex: "version = (.*)"

"square/retrofit":
  external_dependencies:
