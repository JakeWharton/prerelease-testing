    regex: "VERSION_NAME=(.*)"

"cashapp/zipline":
  setup:
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.14.0
    - run: zig build -p src/jvmMain/resources/jni
      working-directory: cashapp-zipline/zipline
  pre_build: kotlinUpgradeYarnLock
  post_build: -x spotlessCheck -x :zipline-gradle-plugin:validatePlugins
  external_dependencies:
    agp: libraries.android-gradle-plugin
    kotlin: versions.kotlin
  internal_dependencies:
    "cashapp/turbine": libraries.turbine
    "JakeWharton/test-distribution-gradle-plugin": libraries.testDistributionGradlePlugin
    "square/okhttp": versions.okHttp
    "square/okio": versions.okio
    "sqldelight/sqldelight": versions.sqldelight
  version:
    file: gradle.properties
    regex: "VERSION_NAME=(.*)"

